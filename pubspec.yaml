name: usewise_flutter
description: Official Flutter SDK for Usewise product analytics. Track events, identify users, and monitor funnels.
version: 2.6.0
homepage: https://usewise.io
repository: https://github.com/smasoftware/usewise-flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  uuid: ^4.5.0
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0
  flutter_jailbreak_detection: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
